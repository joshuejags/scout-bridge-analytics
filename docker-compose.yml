version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: scout-bridge-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: scout-bridge-server
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://root:password123@mongodb:27017/scout-bridge-analytics?authSource=admin
      - PORT=5000
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: scout-bridge-client
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    ports:
      - '3000:3000'
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  mongodb_data:
